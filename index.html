<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TradingView Screener Terminal — Advanced stock and crypto screening with real-time data">
    <meta name="theme-color" content="#070b14">
    <title>Screener Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        t: {
                            bg: '#070b14',
                            surface: '#0d1321',
                            elevated: '#151d2e',
                            border: '#1a2744',
                            text: '#e8edf5',
                            muted: '#7a8ba7',
                            green: '#00e5a0',
                            red: '#ff3b5c',
                            cyan: '#00d4ff',
                            yellow: '#ffd000',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #070b14;
            color: #e8edf5;
            overflow: hidden;
            height: 100vh;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0d1321; }
        ::-webkit-scrollbar-thumb { background: #1a2744; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a3a5c; }

        .bg-grid {
            background-image:
                linear-gradient(rgba(26,39,68,0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26,39,68,0.25) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        .glow-border::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 5%, #00e5a0 35%, #00d4ff 65%, transparent 95%);
            opacity: 0.5;
        }

        @keyframes pulse-live {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,229,160,0.6); }
            50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(0,229,160,0); }
        }
        .pulse-dot { animation: pulse-live 2s ease-in-out infinite; }

        @keyframes scanline {
            0% { top: -2px; }
            100% { top: 100vh; }
        }
        .scanline {
            position: fixed; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,229,160,0.07), transparent);
            animation: scanline 10s linear infinite;
            pointer-events: none; z-index: 100;
        }

        .tab-indicator {
            position: absolute;
            bottom: 0;
            height: 2px;
            background: #00e5a0;
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 12px rgba(0,229,160,0.5);
            border-radius: 1px;
            z-index: 5;
            pointer-events: none;
        }

        .btn-scan {
            transition: all 0.15s ease;
            border: 1px solid #1a2744;
        }
        .btn-scan:hover { border-color: rgba(0,229,160,0.4); background: rgba(0,229,160,0.06); }
        .btn-scan.active { border-color: #00e5a0; background: rgba(0,229,160,0.12); color: #00e5a0; }

        .wl-item {
            transition: all 0.12s ease;
            border-left: 2px solid transparent;
        }
        .wl-item:hover { background: rgba(0,229,160,0.04); border-left-color: rgba(0,229,160,0.25); }

        .dd-menu {
            opacity: 0; transform: translateY(-6px) scale(0.98);
            pointer-events: none;
            transition: all 0.2s ease;
        }
        .dd-open .dd-menu { opacity: 1; transform: translateY(2px) scale(1); pointer-events: auto; }
        .dd-item { transition: background 0.12s; }
        .dd-item:hover { background: rgba(0,229,160,0.08); }

        @keyframes toast-in {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toast-out {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }
        .toast-in { animation: toast-in 0.35s cubic-bezier(0.22,1,0.36,1) forwards; }
        .toast-out { animation: toast-out 0.3s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease forwards; }

        .tv-embed-container { height: 100% !important; width: 100% !important; }
        .tv-embed-container > div:first-child { height: 100% !important; width: 100% !important; }

        .panel-clip {
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed; left: -320px; top: 0; bottom: 0;
                z-index: 50; transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
                box-shadow: none;
            }
            .sidebar.open { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.6); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="bg-grid flex flex-col">
    <div class="scanline"></div>
    <div id="toasts" class="fixed top-16 right-3 z-[200] flex flex-col gap-2 pointer-events-none"></div>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- HEADER -->
    <header class="relative glow-border h-14 flex items-center justify-between px-4 bg-t-surface/80 backdrop-blur-md flex-shrink-0 z-30">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="md:hidden w-8 h-8 flex items-center justify-center rounded-lg hover:bg-t-elevated transition-colors text-t-muted" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-t-green to-t-cyan flex items-center justify-center shadow-lg shadow-t-green/10">
                    <i class="fas fa-chart-line text-t-bg text-xs font-bold"></i>
                </div>
                <div class="leading-none">
                    <span class="text-[13px] font-bold tracking-widest">SCREENER</span>
                    <span class="block text-[9px] text-t-muted tracking-[0.2em] mt-0.5">TERMINAL</span>
                </div>
            </div>
        </div>

        <div class="relative" id="mkt-dd">
            <button onclick="toggleDropdown()" class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-t-border hover:border-t-green/40 transition-colors text-sm" aria-label="Select market" aria-haspopup="true">
                <i class="fas fa-globe text-t-green text-[11px]"></i>
                <span id="mkt-label" class="hidden sm:inline">US Markets</span>
                <i class="fas fa-chevron-down text-t-muted text-[10px] ml-0.5"></i>
            </button>
            <div class="dd-menu absolute top-full left-1/2 -translate-x-1/2 mt-2 min-w-[190px] bg-t-elevated border border-t-border rounded-xl p-1.5 shadow-2xl shadow-black/40 z-50">
                <div class="dd-item px-3 py-2 rounded-lg cursor-pointer text-sm flex items-center gap-2 text-t-green" data-mkt="america" onclick="pickMarket('america','US Markets')">
                    <i class="fas fa-flag-usa text-xs w-4 text-center"></i>US Markets
                </div>
                <div class="dd-item px-3 py-2 rounded-lg cursor-pointer text-sm flex items-center gap-2" data-mkt="europe" onclick="pickMarket('europe','Europe')">
                    <i class="fas fa-landmark text-xs w-4 text-center"></i>Europe
                </div>
                <div class="dd-item px-3 py-2 rounded-lg cursor-pointer text-sm flex items-center gap-2" data-mkt="hongkong" onclick="pickMarket('hongkong','Hong Kong')">
                    <i class="fas fa-building text-xs w-4 text-center"></i>Hong Kong
                </div>
                <div class="dd-item px-3 py-2 rounded-lg cursor-pointer text-sm flex items-center gap-2" data-mkt="crypto" onclick="pickMarket('crypto','Crypto')">
                    <i class="fab fa-bitcoin text-xs w-4 text-center"></i>Crypto
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="hidden sm:flex items-center gap-2 text-[11px] text-t-muted">
                <div class="w-[7px] h-[7px] rounded-full bg-t-green pulse-dot"></div>
                <span class="tracking-wider font-medium">LIVE</span>
            </div>
            <time class="font-mono text-sm text-t-muted tabular-nums" id="clock">--:--:--</time>
        </div>
    </header>

    <!-- TICKER TAPE -->
    <div class="flex-shrink-0 bg-t-bg border-b border-t-border/60 overflow-hidden" style="height:42px">
        <div id="ticker-wrap" class="tv-embed-container"></div>
    </div>

    <!-- MAIN -->
    <main class="flex-1 flex overflow-hidden relative">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar w-[296px] bg-t-surface border-r border-t-border flex flex-col flex-shrink-0 overflow-hidden z-50">
            <div class="p-4 pb-3 border-b border-t-border">
                <h2 class="text-[10px] font-semibold text-t-muted uppercase tracking-[0.15em] mb-3 flex items-center gap-1.5">
                    <i class="fas fa-bolt text-t-yellow text-[9px]"></i> Quick Scans
                </h2>
                <div class="grid grid-cols-2 gap-1.5" id="scan-btns"></div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="px-4 pt-3 pb-1.5 flex items-center justify-between">
                    <h2 class="text-[10px] font-semibold text-t-muted uppercase tracking-[0.15em] flex items-center gap-1.5">
                        <i class="fas fa-star text-t-yellow text-[9px]"></i> Watchlist
                    </h2>
                    <button onclick="toggleAddInput()" class="w-6 h-6 flex items-center justify-center rounded text-t-muted hover:text-t-green hover:bg-t-green/10 transition-all text-xs" aria-label="Add symbol">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="add-form" class="px-4 pb-2 hidden">
                    <div class="flex gap-1.5">
                        <input type="text" id="sym-input" placeholder="e.g. AAPL" class="flex-1 min-w-0 bg-t-elevated border border-t-border rounded-lg px-2.5 py-1.5 text-xs font-mono text-t-text placeholder-t-muted/40 focus:outline-none focus:border-t-green/50 transition-colors" onkeydown="if(event.key==='Enter')addSymbol()" aria-label="Symbol ticker">
                        <button onclick="addSymbol()" class="px-2.5 py-1.5 bg-t-green/15 text-t-green rounded-lg text-xs hover:bg-t-green/25 transition-colors" aria-label="Add">
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </div>
                <div id="watchlist" class="flex-1 overflow-y-auto px-2 pb-2"></div>
            </div>

            <div class="p-4 pt-3 border-t border-t-border">
                <h2 class="text-[10px] font-semibold text-t-muted uppercase tracking-[0.15em] mb-3 flex items-center gap-1.5">
                    <i class="fas fa-chart-bar text-t-cyan text-[9px]"></i> Market Summary
                </h2>
                <div id="mkt-summary" class="space-y-2.5"></div>
            </div>
        </aside>

        <!-- CONTENT PANEL -->
        <section class="flex-1 flex flex-col overflow-hidden min-w-0">
            <nav id="main-nav" class="h-12 flex items-center px-4 border-b border-t-border bg-t-surface/40 flex-shrink-0 relative z-10" role="tablist" aria-label="Main views">
                <div class="flex items-center gap-0.5" id="tab-bar">
                    <button role="tab" aria-selected="true" class="tab-btn px-4 py-2 text-sm font-medium text-t-text rounded-md transition-colors" data-tab="screener" onclick="goTab('screener')">
                        <i class="fas fa-filter mr-1.5 text-[11px]"></i>Screener
                    </button>
                    <button role="tab" aria-selected="false" class="tab-btn px-4 py-2 text-sm font-medium text-t-muted rounded-md transition-colors" data-tab="heatmap" onclick="goTab('heatmap')">
                        <i class="fas fa-th mr-1.5 text-[11px]"></i>Heatmap
                    </button>
                    <button role="tab" aria-selected="false" class="tab-btn px-4 py-2 text-sm font-medium text-t-muted rounded-md transition-colors" data-tab="analysis" onclick="goTab('analysis')">
                        <i class="fas fa-wave-square mr-1.5 text-[11px]"></i>Analysis
                    </button>
                    <button role="tab" aria-selected="false" class="tab-btn px-4 py-2 text-sm font-medium text-t-muted rounded-md transition-colors" data-tab="signals" onclick="goTab('signals')">
                        <i class="fas fa-signal mr-1.5 text-[11px]"></i>Signals
                    </button>
                </div>
                <div class="tab-indicator" id="tab-ind"></div>

                <div id="analysis-input" class="ml-auto items-center gap-1.5 hidden">
                    <input type="text" id="analysis-sym" value="AAPL" placeholder="Symbol" class="bg-t-elevated border border-t-border rounded-lg px-3 py-1.5 text-xs font-mono text-t-text placeholder-t-muted/40 focus:outline-none focus:border-t-green/50 transition-colors w-28" onkeydown="if(event.key==='Enter')runAnalysis()" aria-label="Analysis symbol">
                    <button onclick="runAnalysis()" class="text-t-green hover:text-t-green/70 transition-colors" aria-label="Run analysis">
                        <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                </div>
                <div id="signals-input" class="ml-auto items-center gap-1.5 hidden">
                    <input type="text" id="signal-sym" value="AAPL" placeholder="Symbol" class="bg-t-elevated border border-t-border rounded-lg px-3 py-1.5 text-xs font-mono text-t-text placeholder-t-muted/40 focus:outline-none focus:border-t-green/50 transition-colors w-28" onkeydown="if(event.key==='Enter')runSignal()" aria-label="Signal symbol">
                    <select id="signal-interval" class="bg-t-elevated border border-t-border rounded-lg px-2 py-1.5 text-xs font-mono text-t-text focus:outline-none focus:border-t-green/50 transition-colors">
                        <option value="1h">1H</option>
                        <option value="4h">4H</option>
                        <option value="1D">1D</option>
                        <option value="1W">1W</option>
                    </select>
                    <button onclick="runSignal()" class="text-t-green hover:text-t-green/70 transition-colors" aria-label="Run signal">
                        <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </nav>

            <div class="flex-1 panel-clip">
                <div id="panel-screener" class="absolute inset-0 fade-in" role="tabpanel">
                    <div id="screener-wrap" class="tv-embed-container"></div>
                </div>
                <div id="panel-heatmap" class="absolute inset-0 hidden" role="tabpanel">
                    <div id="heatmap-wrap" class="tv-embed-container"></div>
                </div>
                <div id="panel-analysis" class="absolute inset-0 hidden" role="tabpanel">
                    <div id="analysis-wrap" class="tv-embed-container"></div>
                </div>
                <div id="panel-signals" class="absolute inset-0 hidden overflow-y-auto" role="tabpanel">
                    <div id="signals-wrap" class="p-6 max-w-3xl mx-auto">
                        <div class="text-center text-t-muted py-20">
                            <i class="fas fa-signal text-4xl mb-4 block opacity-20"></i>
                            <p class="text-sm">Enter a symbol and click <i class="fas fa-arrow-right text-xs"></i> to run composite signal analysis</p>
                            <p class="text-xs mt-2 opacity-60">Powered by RSI, MACD, Bollinger Bands, SuperTrend &amp; VWAP</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="h-8 flex items-center justify-between px-4 border-t border-t-border bg-t-surface/40 text-[10px] font-mono text-t-muted flex-shrink-0 select-none">
        <div class="flex items-center gap-3">
            <span class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-t-green inline-block"></span>Connected</span>
            <span id="last-upd">Updated: --</span>
        </div>
        <div class="hidden sm:flex items-center gap-3">
            <span><kbd class="px-1 py-0.5 bg-t-elevated rounded text-[9px] mr-0.5">S</kbd>Screener</span>
            <span><kbd class="px-1 py-0.5 bg-t-elevated rounded text-[9px] mr-0.5">H</kbd>Heatmap</span>
            <span><kbd class="px-1 py-0.5 bg-t-elevated rounded text-[9px] mr-0.5">A</kbd>Analysis</span>
            <span><kbd class="px-1 py-0.5 bg-t-elevated rounded text-[9px] mr-0.5">G</kbd>Signals</span>
            <span><kbd class="px-1 py-0.5 bg-t-elevated rounded text-[9px] mr-0.5">W</kbd>Watchlist</span>
        </div>
    </footer>

    <!-- JAVASCRIPT — No optional chaining, no nullish coalescing, no arrow functions -->
    <script>
    (function() {
        'use strict';

        /* ===== State ===== */
        var S = {
            tab: 'screener',
            market: 'america',
            mktLabel: 'US Markets',
            scan: 'most_capitalized',
            inited: { screener: false, heatmap: false, analysis: false, signals: false },
            watchlist: []
        };

        /* Parse watchlist from localStorage safely */
        try {
            var stored = localStorage.getItem('tv_wl');
            if (stored) {
                S.watchlist = JSON.parse(stored);
            }
        } catch (e) {
            S.watchlist = [];
        }
        if (!Array.isArray(S.watchlist) || S.watchlist.length === 0) {
            S.watchlist = ['AAPL', 'GOOGL', 'MSFT', 'AMZN', 'TSLA', 'NVDA', 'META'];
        }

        /* ===== Base prices ===== */
        var BASE = {
            AAPL: 227.48, GOOGL: 191.23, MSFT: 442.15, AMZN: 224.92,
            TSLA: 352.78, NVDA: 140.14, META: 627.38, NFLX: 1024.50,
            AMD: 178.62, 'BRK.B': 524.30, JPM: 268.14, VISA: 322.87,
            BTC: 104287, ETH: 3842, SOL: 228, BNB: 718, XRP: 2.42,
            SPY: 594.20, QQQ: 524.80, DIA: 432.50, IWM: 236.40
        };
        var WL_PRICES = {};

        /* ===== Scan presets ===== */
        var SCANS = [
            { label: 'Top Cap',     icon: 'fa-building-columns', screen: 'most_capitalized' },
            { label: 'Gainers',     icon: 'fa-arrow-trend-up',   screen: 'top_gainers' },
            { label: 'Losers',      icon: 'fa-arrow-trend-down',  screen: 'top_losers' },
            { label: 'Volatile',    icon: 'fa-bolt',             screen: 'most_volatile' },
            { label: 'High Volume', icon: 'fa-arrow-down',       screen: 'volume_leaders' },
            { label: 'Unusual Vol', icon: 'fa-arrow-up',         screen: 'unusual_volume' }
        ];

        /* ===== Market summary ===== */
        var MKT_DATA = {
            america: [
                { name: 'S&P 500',  p: 5942.47,  c: 0.84 },
                { name: 'NASDAQ',   p: 19211.10, c: 1.12 },
                { name: 'DOW 30',   p: 43287.63, c: 0.35 }
            ],
            europe: [
                { name: 'FTSE 100', p: 8245.72,  c: -0.23 },
                { name: 'DAX 40',   p: 19874.21, c: 0.56 },
                { name: 'CAC 40',   p: 7654.30,  c: 0.18 }
            ],
            hongkong: [
                { name: 'Hang Seng', p: 20134.56, c: -0.42 },
                { name: 'Shanghai',  p: 3267.89,  c: 0.28 },
                { name: 'Shenzhen',  p: 10876.43, c: 0.67 }
            ],
            crypto: [
                { name: 'Bitcoin',  p: 104287.50, c: 2.34 },
                { name: 'Ethereum', p: 3842.18,   c: 1.89 },
                { name: 'Solana',   p: 228.45,    c: -1.23 }
            ]
        };

        /* ===== Helpers ===== */
        function $(id) { return document.getElementById(id); }
        function fmt(n, d) { return Number(n).toFixed(d || 2); }
        function fmtP(n) { return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        function randW() { return (Math.random() - 0.5) * 2; }

        /* ===== Widget injection — config as script textContent ===== */
        function injectWidget(containerId, src, config) {
            try {
                var el = $(containerId);
                if (!el) return;
                el.innerHTML = '';

                var wrapper = document.createElement('div');
                wrapper.className = 'tradingview-widget-container';
                wrapper.style.height = '100%';
                wrapper.style.width = '100%';

                var inner = document.createElement('div');
                inner.className = 'tradingview-widget-container__widget';
                inner.style.height = '100%';
                inner.style.width = '100%';
                wrapper.appendChild(inner);

                var s = document.createElement('script');
                s.type = 'text/javascript';
                s.src = src;
                s.async = true;
                s.textContent = JSON.stringify(config);
                wrapper.appendChild(s);

                el.appendChild(wrapper);
            } catch (err) {
                console.warn('Widget injection failed:', containerId, err);
            }
        }

        /* ===== Toast ===== */
        function toast(msg, type) {
            var colorMap = {
                success: 'border-t-green/60 text-t-green',
                warning: 'border-t-yellow/60 text-t-yellow',
                info: 'border-t-cyan/60 text-t-cyan',
                error: 'border-t-red/60 text-t-red'
            };
            var iconMap = {
                success: 'fa-check-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle',
                error: 'fa-times-circle'
            };
            var t = document.createElement('div');
            t.className = 'toast-in pointer-events-auto flex items-center gap-2 px-4 py-2.5 rounded-xl bg-t-elevated/95 backdrop-blur-md border ' + (colorMap[type] || colorMap.info) + ' text-xs shadow-xl';
            t.innerHTML = '<i class="fas ' + (iconMap[type] || iconMap.info) + '"></i><span class="font-medium">' + msg + '</span>';
            $('toasts').appendChild(t);
            setTimeout(function() {
                t.classList.replace('toast-in', 'toast-out');
                setTimeout(function() { t.remove(); }, 300);
            }, 2800);
        }

        /* ===== Clock ===== */
        function tick() {
            $('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
        }

        function stampUpdate() {
            $('last-upd').textContent = 'Updated: ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        /* ===== Market Dropdown ===== */
        window.toggleDropdown = function() {
            $('mkt-dd').classList.toggle('dd-open');
        };
        document.addEventListener('click', function(e) {
            if (!$('mkt-dd').contains(e.target)) {
                $('mkt-dd').classList.remove('dd-open');
            }
        });

        window.pickMarket = function(mkt, label) {
            S.market = mkt;
            S.mktLabel = label;
            $('mkt-label').textContent = label;
            $('mkt-dd').classList.remove('dd-open');

            var items = document.querySelectorAll('.dd-item');
            for (var i = 0; i < items.length; i++) {
                if (items[i].getAttribute('data-mkt') === mkt) {
                    items[i].classList.add('text-t-green');
                    items[i].classList.remove('text-t-text');
                } else {
                    items[i].classList.remove('text-t-green');
                    items[i].classList.add('text-t-text');
                }
            }

            renderSummary();
            if (S.tab !== 'screener') goTab('screener');
            requestAnimationFrame(function() {
                S.inited.screener = false;
                S.inited.heatmap = false;
                initScreener();
            });
            toast('Switched to ' + label, 'info');
        };

        /* ===== Tabs — indicator uses nav as reference, fade re-triggers with reflow ===== */
        window.goTab = function(id) {
            S.tab = id;

            var btns = document.querySelectorAll('.tab-btn');
            for (var i = 0; i < btns.length; i++) {
                var b = btns[i];
                var active = b.getAttribute('data-tab') === id;
                if (active) {
                    b.classList.add('text-t-text');
                    b.classList.remove('text-t-muted');
                } else {
                    b.classList.remove('text-t-text');
                    b.classList.add('text-t-muted');
                }
                b.setAttribute('aria-selected', active ? 'true' : 'false');
            }

            var panels = ['screener', 'heatmap', 'analysis', 'signals'];
            for (var j = 0; j < panels.length; j++) {
                var p = panels[j];
                var el = $('panel-' + p);
                if (p === id) {
                    el.classList.remove('hidden', 'fade-in');
                    void el.offsetWidth;
                    el.classList.add('fade-in');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('fade-in');
                }
            }

            $('analysis-input').style.display = (id === 'analysis') ? 'flex' : 'none';
            $('signals-input').style.display = (id === 'signals') ? 'flex' : 'none';
            moveIndicator();

            if (id === 'heatmap' && !S.inited.heatmap) initHeatmap();
            if (id === 'analysis' && !S.inited.analysis) initAnalysis();
        };

        function moveIndicator() {
            var btn = document.querySelector('.tab-btn[aria-selected="true"]');
            var ind = $('tab-ind');
            var nav = $('main-nav');
            if (!btn || !ind || !nav) return;
            var navRect = nav.getBoundingClientRect();
            var btnRect = btn.getBoundingClientRect();
            ind.style.left = (btnRect.left - navRect.left) + 'px';
            ind.style.width = btnRect.width + 'px';
        }

        /* ===== Widget Initializers ===== */
        function initTicker() {
            injectWidget('ticker-wrap', 'https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js', {
                symbols: [
                    { proName: 'FOREXCOM:SPXUSD', title: 'S&P 500' },
                    { proName: 'FOREXCOM:NSXUSD', title: 'Nasdaq 100' },
                    { proName: 'BITSTAMP:BTCUSD', title: 'BTC/USD' },
                    { proName: 'BITSTAMP:ETHUSD', title: 'ETH/USD' },
                    { proName: 'FX:EURUSD', title: 'EUR/USD' },
                    { proName: 'FX:GBPUSD', title: 'GBP/USD' },
                    { proName: 'NASDAQ:AAPL', title: 'Apple' },
                    { proName: 'NASDAQ:GOOGL', title: 'Alphabet' },
                    { proName: 'NASDAQ:MSFT', title: 'Microsoft' },
                    { proName: 'NASDAQ:AMZN', title: 'Amazon' },
                    { proName: 'NASDAQ:NVDA', title: 'NVIDIA' },
                    { proName: 'NASDAQ:TSLA', title: 'Tesla' }
                ],
                showSymbolLogo: true,
                isTransparent: true,
                displayMode: 'adaptive',
                colorTheme: 'dark',
                locale: 'en'
            });
        }

        function initScreener() {
            injectWidget('screener-wrap', 'https://s3.tradingview.com/external-embedding/embed-widget-screener.js', {
                width: '100%',
                height: '100%',
                defaultColumn: 'overview',
                defaultScreen: S.scan,
                market: S.market,
                showToolbar: true,
                colorTheme: 'dark',
                locale: 'en',
                isTransparent: true
            });
            S.inited.screener = true;
        }

        function initHeatmap() {
            var src = (S.market === 'crypto') ? 'CRYPTO' : 'SPX500';
            injectWidget('heatmap-wrap', 'https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js', {
                exchanges: [],
                dataSource: src,
                grouping: 'sector',
                blockSize: 'market_cap_basic',
                blockColor: 'change',
                locale: 'en',
                symbolUrl: '',
                colorTheme: 'dark',
                hasTopBar: true,
                isDataSetEnabled: true,
                isZoomEnabled: true,
                hasSymbolTooltip: true,
                isTransparent: true,
                width: '100%',
                height: '100%'
            });
            S.inited.heatmap = true;
        }

        function initAnalysis() {
            var symEl = $('analysis-sym');
            var sym = ((symEl && symEl.value) || 'AAPL').toUpperCase();
            var prefix = (S.market === 'crypto') ? 'BITSTAMP' : 'NASDAQ';
            injectWidget('analysis-wrap', 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js', {
                interval: '1h',
                width: '100%',
                height: '100%',
                isTransparent: true,
                symbol: prefix + ':' + sym,
                showIntervalTabs: true,
                colorTheme: 'dark',
                locale: 'en'
            });
            S.inited.analysis = true;
        }

        window.runAnalysis = function() {
            var symEl = $('analysis-sym');
            var sym = (symEl && symEl.value) ? symEl.value.trim().toUpperCase() : '';
            if (!sym) return;
            S.inited.analysis = false;
            requestAnimationFrame(initAnalysis);
            toast('Analyzing ' + sym, 'info');
        };

        /* ===== Signal Engine (backend API) ===== */
        window.runSignal = function() {
            var symEl = $('signal-sym');
            var intEl = $('signal-interval');
            var sym = (symEl && symEl.value) ? symEl.value.trim().toUpperCase() : '';
            var interval = (intEl && intEl.value) ? intEl.value : '1h';
            if (!sym) return;

            var wrap = $('signals-wrap');
            wrap.innerHTML = '<div class="text-center text-t-muted py-20"><i class="fas fa-spinner fa-spin text-2xl mb-4 block text-t-green"></i><p class="text-sm">Analyzing ' + sym + '...</p></div>';
            toast('Running signal analysis for ' + sym, 'info');

            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/signal/' + encodeURIComponent(sym) + '?interval=' + encodeURIComponent(interval));
            xhr.timeout = 30000;
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        renderSignalResult(data);
                        toast(sym + ': ' + data.rating + ' (' + (data.score >= 0 ? '+' : '') + data.score.toFixed(3) + ')', 'success');
                    } catch (e) {
                        wrap.innerHTML = '<div class="text-center text-t-red py-20"><i class="fas fa-exclamation-triangle text-2xl mb-4 block"></i><p class="text-sm">Failed to parse response</p></div>';
                        toast('Signal parse error', 'error');
                    }
                } else {
                    var errMsg = 'Server error (' + xhr.status + ')';
                    try { errMsg = JSON.parse(xhr.responseText).error || errMsg; } catch (e) {}
                    wrap.innerHTML = '<div class="text-center text-t-red py-20"><i class="fas fa-exclamation-triangle text-2xl mb-4 block"></i><p class="text-sm">' + errMsg + '</p></div>';
                    toast('Signal failed: ' + errMsg, 'error');
                }
            };
            xhr.onerror = function() {
                wrap.innerHTML = '<div class="text-center text-t-muted py-20"><i class="fas fa-plug text-2xl mb-4 block opacity-40"></i><p class="text-sm">Cannot connect to backend</p><p class="text-xs mt-2 opacity-60">Start the server: <code class="bg-t-elevated px-2 py-1 rounded">python main.py</code></p></div>';
                toast('Backend not reachable', 'warning');
            };
            xhr.ontimeout = function() {
                wrap.innerHTML = '<div class="text-center text-t-yellow py-20"><i class="fas fa-clock text-2xl mb-4 block"></i><p class="text-sm">Request timed out</p></div>';
                toast('Signal request timed out', 'warning');
            };
            xhr.send();
        };

        function renderSignalResult(data) {
            var wrap = $('signals-wrap');
            var score = data.score || 0;
            var rating = data.rating || 'NEUTRAL';
            var signals = data.signals || {};
            var components = data.components || {};

            var ratingColors = {
                'STRONG BUY':  { bg: 'rgba(0,229,160,0.15)', border: '#00e5a0', text: '#00e5a0' },
                'BUY':         { bg: 'rgba(0,212,255,0.15)', border: '#00d4ff', text: '#00d4ff' },
                'NEUTRAL':     { bg: 'rgba(122,139,167,0.15)', border: '#7a8ba7', text: '#7a8ba7' },
                'SELL':        { bg: 'rgba(255,208,0,0.15)',  border: '#ffd000', text: '#ffd000' },
                'STRONG SELL': { bg: 'rgba(255,59,92,0.15)',  border: '#ff3b5c', text: '#ff3b5c' }
            };
            var rc = ratingColors[rating] || ratingColors['NEUTRAL'];

            var signalLabels = {
                rsi:  { name: 'RSI',         icon: 'fa-chart-line',     weight: '20%' },
                macd: { name: 'MACD',        icon: 'fa-wave-square',    weight: '25%' },
                bb:   { name: 'Bollinger',   icon: 'fa-arrows-alt-v',   weight: '15%' },
                st:   { name: 'SuperTrend',  icon: 'fa-arrow-trend-up', weight: '25%' },
                vwap: { name: 'VWAP',        icon: 'fa-scale-balanced', weight: '15%' }
            };

            var scoreBarPct = Math.round((score + 1) / 2 * 100);
            var scoreSign = score >= 0 ? '+' : '';

            var html = '';

            /* Header card */
            html += '<div class="rounded-2xl border p-6 mb-6" style="background:' + rc.bg + ';border-color:' + rc.border + '">';
            html += '<div class="flex items-center justify-between mb-4">';
            html += '<div><span class="text-2xl font-bold font-mono">' + data.ticker + '</span>';
            html += '<span class="text-xs text-t-muted ml-2">' + (data.interval || '1h').toUpperCase() + '</span></div>';
            html += '<div class="text-right"><div class="text-xl font-bold" style="color:' + rc.text + '">' + rating + '</div>';
            html += '<div class="text-sm font-mono text-t-muted">Score: ' + scoreSign + score.toFixed(4) + '</div></div></div>';

            /* Score bar */
            html += '<div class="relative h-3 rounded-full bg-t-elevated overflow-hidden">';
            html += '<div class="absolute inset-y-0 left-0 rounded-full transition-all" style="width:' + scoreBarPct + '%;background:linear-gradient(90deg,#ff3b5c,#ffd000 40%,#00e5a0 70%,#00d4ff)"></div>';
            html += '<div class="absolute inset-y-0 w-0.5 bg-white/60" style="left:50%"></div>';
            html += '</div>';
            html += '<div class="flex justify-between text-[10px] text-t-muted mt-1 font-mono"><span>STRONG SELL</span><span>NEUTRAL</span><span>STRONG BUY</span></div>';
            html += '</div>';

            /* Individual indicators */
            html += '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mb-6">';
            var keys = ['rsi', 'macd', 'bb', 'st', 'vwap'];
            for (var i = 0; i < keys.length; i++) {
                var k = keys[i];
                var sl = signalLabels[k];
                var sigVal = signals[k] || 'n/a';
                var compScore = components[k] !== undefined ? components[k] : 0;
                var compSign = compScore >= 0 ? '+' : '';
                var compColor = compScore > 0 ? '#00e5a0' : compScore < 0 ? '#ff3b5c' : '#7a8ba7';

                html += '<div class="rounded-xl border border-t-border bg-t-surface p-4">';
                html += '<div class="flex items-center justify-between mb-2">';
                html += '<div class="flex items-center gap-2"><i class="fas ' + sl.icon + ' text-t-cyan text-xs"></i>';
                html += '<span class="text-sm font-medium">' + sl.name + '</span></div>';
                html += '<span class="text-[10px] text-t-muted">w: ' + sl.weight + '</span></div>';
                html += '<div class="text-xs font-mono text-t-muted mb-1">' + sigVal.replace(/_/g, ' ') + '</div>';
                html += '<div class="text-lg font-bold font-mono" style="color:' + compColor + '">' + compSign + compScore.toFixed(1) + '</div>';
                html += '</div>';
            }
            html += '</div>';

            /* How to use hint */
            html += '<div class="rounded-xl border border-t-border bg-t-elevated/50 p-4 text-xs text-t-muted">';
            html += '<i class="fas fa-info-circle mr-1.5 text-t-cyan"></i>';
            html += 'Composite signal from 5 indicators weighted by reliability. Score range: -1.0 (strong sell) to +1.0 (strong buy). ';
            html += 'Data fetched via Yahoo Finance. Click any watchlist symbol to auto-fill.';
            html += '</div>';

            wrap.innerHTML = html;
        }

        window.viewSignal = function(sym) {
            $('signal-sym').value = sym;
            goTab('signals');
            runSignal();
        };

        /* ===== Scan Buttons ===== */
        function renderScans() {
            var html = '';
            for (var i = 0; i < SCANS.length; i++) {
                var s = SCANS[i];
                var cls = (S.scan === s.screen) ? ' active' : '';
                html += '<button class="btn-scan rounded-lg px-2.5 py-2 text-left' + cls + '" onclick="pickScan(\'' + s.screen + '\')" aria-label="' + s.label + ' scan">';
                html += '<i class="fas ' + s.icon + ' text-[10px] mr-1 opacity-70"></i><span class="text-[11px] font-medium">' + s.label + '</span>';
                html += '</button>';
            }
            $('scan-btns').innerHTML = html;
        }

        window.pickScan = function(screen) {
            S.scan = screen;
            renderScans();
            if (S.tab !== 'screener') goTab('screener');
            requestAnimationFrame(function() {
                S.inited.screener = false;
                initScreener();
            });
            var label = '';
            for (var i = 0; i < SCANS.length; i++) {
                if (SCANS[i].screen === screen) { label = SCANS[i].label; break; }
            }
            toast('Scan: ' + (label || screen), 'success');
        };

        /* ===== Watchlist ===== */
        function initPrices() {
            for (var i = 0; i < S.watchlist.length; i++) {
                var sym = S.watchlist[i];
                if (!WL_PRICES[sym]) {
                    WL_PRICES[sym] = {
                        price: BASE[sym] || (Math.random() * 200 + 20),
                        change: randW()
                    };
                }
            }
        }

        function renderWatchlist() {
            initPrices();
            var el = $('watchlist');
            if (!S.watchlist.length) {
                el.innerHTML = '<div class="p-6 text-center text-t-muted text-xs"><i class="fas fa-inbox text-xl mb-2 block opacity-20"></i>No symbols added</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < S.watchlist.length; i++) {
                var sym = S.watchlist[i];
                var d = WL_PRICES[sym];
                if (!d) continue;
                var up = d.change >= 0;
                var dotCls = up ? 'bg-t-green' : 'bg-t-red';
                var chgCls = up ? 'text-t-green' : 'text-t-red';
                var chgSign = up ? '+' : '';
                html += '<div class="wl-item flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer group" onclick="viewSym(\'' + sym + '\')">';
                html += '<div class="flex items-center gap-2 min-w-0">';
                html += '<span class="w-1.5 h-1.5 rounded-full flex-shrink-0 ' + dotCls + '"></span>';
                html += '<span class="text-[13px] font-semibold font-mono truncate">' + sym + '</span>';
                html += '</div>';
                html += '<div class="flex items-center gap-2.5 flex-shrink-0">';
                html += '<span class="text-[11px] font-mono text-t-muted">$' + fmtP(d.price) + '</span>';
                html += '<span class="text-[11px] font-mono font-medium ' + chgCls + ' min-w-[52px] text-right">' + chgSign + fmt(d.change) + '%</span>';
                html += '<button onclick="event.stopPropagation();viewSignal(\'' + sym + '\')" class="opacity-0 group-hover:opacity-100 w-5 h-5 flex items-center justify-center rounded text-t-muted hover:text-t-cyan hover:bg-t-cyan/10 transition-all" aria-label="Signal ' + sym + '" title="Run signal analysis"><i class="fas fa-signal text-[10px]"></i></button>';
                html += '<button onclick="event.stopPropagation();rmSym(' + i + ')" class="opacity-0 group-hover:opacity-100 w-5 h-5 flex items-center justify-center rounded text-t-muted hover:text-t-red hover:bg-t-red/10 transition-all" aria-label="Remove ' + sym + '"><i class="fas fa-xmark text-[10px]"></i></button>';
                html += '</div></div>';
            }
            el.innerHTML = html;
            try { localStorage.setItem('tv_wl', JSON.stringify(S.watchlist)); } catch (e) {}
        }

        window.toggleAddInput = function() {
            var f = $('add-form');
            f.classList.toggle('hidden');
            if (!f.classList.contains('hidden')) $('sym-input').focus();
        };

        window.addSymbol = function() {
            var inp = $('sym-input');
            var sym = inp.value.trim().toUpperCase();
            if (!sym) return;
            for (var i = 0; i < S.watchlist.length; i++) {
                if (S.watchlist[i] === sym) {
                    toast(sym + ' already in watchlist', 'warning');
                    return;
                }
            }
            S.watchlist.push(sym);
            WL_PRICES[sym] = { price: BASE[sym] || (Math.random() * 200 + 20), change: randW() };
            inp.value = '';
            renderWatchlist();
            toast(sym + ' added to watchlist', 'success');
        };

        window.rmSym = function(i) {
            var sym = S.watchlist[i];
            S.watchlist.splice(i, 1);
            delete WL_PRICES[sym];
            renderWatchlist();
            toast(sym + ' removed', 'info');
        };

        window.viewSym = function(sym) {
            $('analysis-sym').value = sym;
            S.inited.analysis = false;
            goTab('analysis');
        };

        /* ===== Market Summary ===== */
        function renderSummary() {
            var data = MKT_DATA[S.market] || [];
            var html = '';
            for (var i = 0; i < data.length; i++) {
                var d = data[i];
                var up = d.c >= 0;
                var chgCls = up ? 'text-t-green' : 'text-t-red';
                var chgSign = up ? '+' : '';
                html += '<div class="flex items-center justify-between">';
                html += '<span class="text-[11px] text-t-muted">' + d.name + '</span>';
                html += '<div class="flex items-center gap-2">';
                html += '<span class="text-[11px] font-mono">' + fmtP(d.p) + '</span>';
                html += '<span class="text-[10px] font-mono font-medium ' + chgCls + '">' + chgSign + fmt(d.c) + '%</span>';
                html += '</div></div>';
            }
            $('mkt-summary').innerHTML = html;
        }

        function simMarket() {
            var data = MKT_DATA[S.market] || [];
            for (var i = 0; i < data.length; i++) {
                var d = data[i];
                d.p *= 1 + (Math.random() - 0.5) * 0.0008;
                d.c += (Math.random() - 0.5) * 0.04;
                d.p = +d.p.toFixed(2);
                d.c = +d.c.toFixed(2);
            }
            renderSummary();
        }

        function simWatchlist() {
            for (var i = 0; i < S.watchlist.length; i++) {
                var sym = S.watchlist[i];
                var d = WL_PRICES[sym];
                if (!d) continue;
                d.price *= 1 + (Math.random() - 0.5) * 0.0015;
                d.change += (Math.random() - 0.5) * 0.06;
                d.price = +d.price.toFixed(2);
                d.change = +d.change.toFixed(2);
            }
            renderWatchlist();
        }

        /* ===== Sidebar Toggle ===== */
        window.toggleSidebar = function() {
            $('sidebar').classList.toggle('open');
            $('sidebar-overlay').classList.toggle('hidden');
        };

        /* ===== Keyboard Shortcuts ===== */
        document.addEventListener('keydown', function(e) {
            var tag = e.target.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
            var key = e.key.toLowerCase();
            if (key === 's') goTab('screener');
            else if (key === 'h') goTab('heatmap');
            else if (key === 'a') goTab('analysis');
            else if (key === 'g') goTab('signals');
            else if (key === 'w') toggleAddInput();
            else if (key === 'escape') {
                $('mkt-dd').classList.remove('dd-open');
                $('sidebar').classList.remove('open');
                $('sidebar-overlay').classList.add('hidden');
            }
        });

        /* ===== Init ===== */
        function boot() {
            tick();
            setInterval(tick, 1000);
            stampUpdate();
            setInterval(stampUpdate, 30000);
            renderScans();
            renderWatchlist();
            renderSummary();
            moveIndicator();
            initTicker();
            setTimeout(initScreener, 100);
            setInterval(simMarket, 3000);
            setInterval(simWatchlist, 2500);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', boot);
        } else {
            boot();
        }
        window.addEventListener('resize', moveIndicator);
    })();
    </script>
</body>
</html>
